name: Boot Teddy-OS ISO in QEMU

on:
  workflow_dispatch:
    inputs:
      profile:
        description: Build profile
        required: true
        default: release
        type: choice
        options:
          - debug
          - release

jobs:
  boot-iso-qemu:
    runs-on: ubuntu-latest

    env:
      PROFILE: ${{ inputs.profile }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install system dependencies
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            xorriso \
            mtools \
            qemu-system-x86 \
            ovmf \
            p7zip-full

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@nightly
        with:
          targets: x86_64-unknown-uefi
          components: rust-src, llvm-tools-preview

      - name: Cache Cargo registry + build output
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: teddy-os-${{ runner.os }}-${{ env.PROFILE }}

      - name: Build ISO
        shell: pwsh
        run: |
          if ($env:PROFILE -eq 'release') {
            ./scripts/build.ps1 -Profile release
          } else {
            ./scripts/build.ps1
          }

      - name: Verify ISO output
        shell: bash
        run: |
          set -euo pipefail

          ISO="build/dist/teddy-os-${PROFILE}.iso"
          if [ ! -f "$ISO" ]; then
            echo "Missing ISO: $ISO"
            echo "Contents of build/dist:"
            ls -la build/dist || true
            exit 1
          fi

          echo "ISO ready: $ISO"

      - name: Boot ISO in QEMU
        shell: bash
        run: |
          set -euo pipefail

          ISO="build/dist/teddy-os-${PROFILE}.iso"
          mkdir -p qemu-logs

          find_ovmf_file() {
            for f in "$@"; do
              if [ -f "$f" ]; then
                printf '%s\n' "$f"
                return 0
              fi
            done
            return 1
          }

          OVMF_CODE="$(find_ovmf_file \
            /usr/share/OVMF/OVMF_CODE.fd \
            /usr/share/OVMF/OVMF_CODE_4M.fd \
            /usr/share/OVMF/OVMF_CODE.4m.fd \
            /usr/share/edk2/ovmf/OVMF_CODE.fd \
            /usr/share/edk2/ovmf/OVMF_CODE_4M.fd \
            /usr/share/qemu/OVMF_CODE.fd
          )" || {
            echo "Could not find OVMF_CODE file"
            find /usr/share -maxdepth 4 \( -name 'OVMF*' -o -name 'QEMU*.fd' \) 2>/dev/null | sort || true
            exit 1
          }

          OVMF_VARS_SRC="$(find_ovmf_file \
            /usr/share/OVMF/OVMF_VARS.fd \
            /usr/share/OVMF/OVMF_VARS_4M.fd \
            /usr/share/OVMF/OVMF_VARS.4m.fd \
            /usr/share/edk2/ovmf/OVMF_VARS.fd \
            /usr/share/edk2/ovmf/OVMF_VARS_4M.fd \
            /usr/share/qemu/OVMF_VARS.fd
          )" || {
            echo "Could not find OVMF_VARS file"
            find /usr/share -maxdepth 4 \( -name 'OVMF*' -o -name 'QEMU*.fd' \) 2>/dev/null | sort || true
            exit 1
          }

          cp "$OVMF_VARS_SRC" OVMF_VARS.fd

          echo "Using ISO: $ISO"
          echo "Using OVMF_CODE: $OVMF_CODE"
          echo "Using OVMF_VARS: $OVMF_VARS_SRC"

          STATUS=0
          timeout 30s qemu-system-x86_64 \
            -machine q35,accel=tcg \
            -cpu qemu64 \
            -m 1024 \
            -smp 2 \
            -drive if=pflash,format=raw,readonly=on,file="$OVMF_CODE" \
            -drive if=pflash,format=raw,file=OVMF_VARS.fd \
            -cdrom "$ISO" \
            -boot d \
            -serial file:qemu-logs/serial.log \
            -display none \
            -monitor none \
            -no-reboot \
            -net none || STATUS=$?

          echo "QEMU exit status: $STATUS"

          if [ "$STATUS" -ne 0 ] && [ "$STATUS" -ne 124 ]; then
            echo "QEMU failed before timeout."
            [ -f qemu-logs/serial.log ] && cat qemu-logs/serial.log
            exit "$STATUS"
          fi

          echo "QEMU boot completed or remained running until timeout."
          [ -f qemu-logs/serial.log ] && cat qemu-logs/serial.log || true

      - name: Upload QEMU logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: teddy-os-${{ env.PROFILE }}-qemu-logs
          path: |
            qemu-logs/**
            OVMF_VARS.fd
          if-no-files-found: warn
