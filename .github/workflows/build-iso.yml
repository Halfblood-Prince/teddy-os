name: Build Teddy-OS ISO

on:
  workflow_dispatch:
    inputs:
      profile:
        description: Build profile
        required: true
        default: release
        type: choice
        options:
          - debug
          - release
  push:
    tags:
      - "v*"
  pull_request:

permissions:
  contents: write

jobs:
  build-iso:
    runs-on: ubuntu-latest
    env:
      PROFILE: ${{ inputs.profile || 'release' }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install host tools
        run: |
          sudo apt-get update
          sudo apt-get install -y xorriso nasm

      - name: Build ISO
        shell: pwsh
        run: ./scripts/build.ps1 -Profile $env:PROFILE

      - name: Verify output
        shell: pwsh
        run: |
          $iso = "build/dist/teddy-os-$env:PROFILE.iso"
          $sha = "$iso.sha256"

          if (-not (Test-Path $iso)) {
            throw "Missing ISO output."
          }
          if (-not (Test-Path $sha)) {
            throw "Missing ISO checksum."
          }

      - name: Prepare release bundle
        shell: pwsh
        run: |
          $distDir = "dist"
          $iso = "build/dist/teddy-os-$env:PROFILE.iso"
          $sha = "$iso.sha256"

          if (Test-Path $distDir) {
            Remove-Item -Recurse -Force $distDir
          }
          New-Item -ItemType Directory -Force -Path $distDir | Out-Null

          Copy-Item $iso (Join-Path $distDir "teddy-os-$env:PROFILE.iso") -Force
          Copy-Item $sha (Join-Path $distDir "teddy-os-$env:PROFILE.iso.sha256") -Force

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: teddy-os-${{ env.PROFILE }}-iso
          path: dist/
          if-no-files-found: error

      - name: Compute release metadata
        id: release_meta
        if: github.event_name != 'pull_request'
        shell: pwsh
        run: |
          if ("${{ github.ref_type }}" -eq "tag") {
            $tag = "${{ github.ref_name }}"
            $name = "Teddy-OS $tag"
          } else {
            $tag = "manual-${env:PROFILE}-${{ github.run_number }}"
            $name = "Teddy-OS manual ${env:PROFILE} build #${{ github.run_number }}"
          }

          "tag=$tag" >> $env:GITHUB_OUTPUT
          "name=$name" >> $env:GITHUB_OUTPUT

      - name: Publish GitHub Release
        if: github.event_name != 'pull_request'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_meta.outputs.tag }}
          name: ${{ steps.release_meta.outputs.name }}
          generate_release_notes: true
          files: |
            dist/teddy-os-${{ env.PROFILE }}.iso
            dist/teddy-os-${{ env.PROFILE }}.iso.sha256
